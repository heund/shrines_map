<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeju Biennale Map Login</title>
  <style>
    :root {
      --bg: #f0e5d2;
      --bg-deep: #d7c4a6;
      --panel: rgba(253, 249, 242, 0.94);
      --panel-border: rgba(83, 58, 31, 0.12);
      --text: #281f17;
      --muted: #6d5b49;
      --accent: #0d6b78;
      --accent-dark: #084d56;
      --danger: #b63a2b;
      --shadow: 0 24px 60px rgba(55, 37, 18, 0.18);
      --radius: 24px;
      --font: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, rgba(13, 107, 120, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(192, 142, 74, 0.22), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }

    .login-shell {
      width: min(100%, 440px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 30px 28px 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 14px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(13, 107, 120, 0.08);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.3rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 700;
    }

    input[type="password"] {
      width: 100%;
      margin-top: 8px;
      padding: 15px 16px;
      border: 1px solid rgba(83, 58, 31, 0.14);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: rgba(13, 107, 120, 0.5);
      box-shadow: 0 0 0 4px rgba(13, 107, 120, 0.12);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: white;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.03);
    }

    .error {
      display: none;
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(182, 58, 43, 0.08);
      color: var(--danger);
      font-size: 0.92rem;
      font-weight: 700;
    }

    body.has-error .error {
      display: block;
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <span class="eyebrow">Protected Access</span>
    <h1>Jeju Biennale Map</h1>
    <p>Sign in with the shared password to open the private deployment.</p>

    <div class="error" id="errorMessage">Password was incorrect. Please try again.</div>

    <form method="post" action="/login">
      <label for="password">
        Password
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </label>
      <button type="submit">Open Map</button>
    </form>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("error") === "1") {
      document.body.classList.add("has-error");
    }
  </script>
</body>
</html>
